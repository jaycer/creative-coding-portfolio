<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="sky" cx="0.52" cy="0.46" r="0.9">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="0.6" stop-color="#060814"/>
      <stop offset="1" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="hole" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(150,180,255,0)"/>
      <stop offset="0.32" stop-color="rgba(150,180,255,0.42)"/>
      <stop offset="0.55" stop-color="rgba(120,150,240,0.14)"/>
      <stop offset="1" stop-color="rgba(90,120,220,0)"/>
    </radialGradient>
    <g id="chr" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-18 -34 V22"/><path d="M-18 -2 H20 V22"/><path d="M-18 -22 H8"/>
      <path d="M20 -2 V22"/><path d="M-18 22 V34"/><path d="M20 22 V34"/>
    </g>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- subtle, still stars -->
  <g fill="#cdd6ee">
    <circle cx="60"  cy="70"  r="0.9"/> <circle cx="150" cy="130" r="0.7"/>
    <circle cx="240" cy="60"  r="1"/>   <circle cx="470" cy="80"  r="0.8"/>
    <circle cx="540" cy="150" r="0.7"/> <circle cx="90"  cy="250" r="0.9"/>
    <circle cx="40"  cy="330" r="0.7"/> <circle cx="360" cy="330" r="0.9"/>
    <circle cx="520" cy="330" r="0.7"/> <circle cx="560" cy="250" r="0.8"/>
    <circle cx="200" cy="360" r="0.7"/> <circle cx="430" cy="300" r="0.8"/>
    <circle cx="300" cy="30"  r="0.7"/> <circle cx="120" cy="180" r="0.7"/>
  </g>

  <!-- singularity: soft halo, dark core, bright photon ring -->
  <g transform="translate(330 185)">
    <circle r="90" fill="url(#hole)"/>
    <circle r="24" fill="#000000"/>
    <ellipse rx="33" ry="12" fill="none" stroke="#bcd2ff" stroke-width="3" stroke-opacity="0.9" transform="rotate(-18)"/>
    <ellipse rx="40" ry="15" fill="none" stroke="#8fb0f0" stroke-width="1.5" stroke-opacity="0.5" transform="rotate(-18)"/>
  </g>

  <!-- chair planetoid: a rough ball of chairs packed around the core -->
  <g stroke="#e7d3b0" stroke-width="5">
    <use href="#chr" transform="translate(330 185) rotate(20)  scale(0.55)"/>
    <use href="#chr" transform="translate(298 168) rotate(-40) scale(0.5)"  stroke="#9fb0c2"/>
    <use href="#chr" transform="translate(362 172) rotate(70)  scale(0.5)"  stroke="#c9ad4a"/>
    <use href="#chr" transform="translate(312 210) rotate(130) scale(0.52)" stroke="#a8493f"/>
    <use href="#chr" transform="translate(356 208) rotate(-15) scale(0.5)"  stroke="#cbb488"/>
    <use href="#chr" transform="translate(330 150) rotate(95)  scale(0.46)" stroke="#6f7d8c"/>
    <use href="#chr" transform="translate(330 224) rotate(45)  scale(0.48)" stroke="#4f6b53"/>
    <use href="#chr" transform="translate(284 196) rotate(160) scale(0.44)" stroke="#d6cbb4"/>
    <use href="#chr" transform="translate(376 190) rotate(-70) scale(0.46)" stroke="#8f5a34"/>
  </g>

  <!-- two chairs spiraling in, with faint approach arcs -->
  <g fill="none" stroke="#6f86c0" stroke-width="1.4" stroke-opacity="0.5" stroke-dasharray="2 6">
    <path d="M120 120 Q250 130 300 175"/>
    <path d="M500 280 Q400 250 360 210"/>
  </g>
  <use href="#chr" transform="translate(140 122) rotate(25)  scale(0.6)" fill="none" stroke="#e7d3b0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <use href="#chr" transform="translate(486 276) rotate(-55) scale(0.55)" fill="none" stroke="#9fb0c2" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="40" y="365" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="600" fill="#fff">Chairs in Space</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="sky" cx="0.7" cy="0.28" r="1.1">
      <stop offset="0" stop-color="#12203f"/>
      <stop offset="0.5" stop-color="#080b1c"/>
      <stop offset="1" stop-color="#04050c"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e1"/>
      <stop offset="0.4" stop-color="#ffd79a" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffb45a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planet" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#3a5f96"/>
      <stop offset="1" stop-color="#122744"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#eef2ff">
    <circle cx="60"  cy="60"  r="1.4"/>
    <circle cx="140" cy="120" r="1"/>
    <circle cx="220" cy="70"  r="1.6"/>
    <circle cx="300" cy="40"  r="1"/>
    <circle cx="470" cy="90"  r="1.3"/>
    <circle cx="540" cy="150" r="1"/>
    <circle cx="90"  cy="220" r="1.2"/>
    <circle cx="30"  cy="320" r="1"/>
    <circle cx="360" cy="300" r="1.4"/>
    <circle cx="520" cy="320" r="1"/>
    <circle cx="200" cy="260" r="1"/>
    <circle cx="430" cy="220" r="1.2"/>
    <circle cx="560" cy="250" r="1.3"/>
    <circle cx="120" cy="300" r="1"/>
  </g>
  <g fill="#9fb2ff" opacity="0.8">
    <circle cx="180" cy="170" r="1"/>
    <circle cx="410" cy="130" r="1"/>
    <circle cx="70"  cy="150" r="1"/>
    <circle cx="330" cy="220" r="1"/>
  </g>

  <!-- distant sun glow -->
  <circle cx="470" cy="90" r="120" fill="url(#sun)"/>

  <!-- planet arc, low right -->
  <circle cx="560" cy="430" r="150" fill="url(#planet)"/>
  <circle cx="560" cy="430" r="158" fill="none" stroke="#6fa8ff" stroke-width="6" stroke-opacity="0.18"/>

  <!-- two tumbling chairs, drawn as simple line silhouettes -->
  <g fill="none" stroke="#e7d3b0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
     transform="translate(210 200) rotate(-24) scale(1.5)">
    <path d="M-18 -34 V22"/>
    <path d="M-18 -2 H20 V22"/>
    <path d="M-18 -22 H8"/>
    <path d="M20 -2 V22"/>
    <path d="M-18 22 V34"/>
    <path d="M20 22 V34"/>
  </g>
  <g fill="none" stroke="#9fb0c2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
     transform="translate(400 260) rotate(38) scale(1.0)" opacity="0.9">
    <path d="M-18 -34 V22"/>
    <path d="M-18 -2 H20 V22"/>
    <path d="M-18 -22 H8"/>
    <path d="M20 -2 V22"/>
    <path d="M-18 22 V34"/>
    <path d="M20 22 V34"/>
  </g>

  <text x="40" y="360" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="600" fill="#fff">Chairs in Space</text>
</svg>

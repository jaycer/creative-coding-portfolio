    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0a0d; }
      canvas { position: fixed; inset: 0; display: block; touch-action: none; }

      .bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 18px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
        pointer-events: none;
      }
      .bar h1 { margin: 0 auto 0 0; font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
      .bar .back {
        pointer-events: auto;
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 12px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 999px;
        white-space: nowrap;
        transition: background 0.15s ease;
      }
      .bar .back:hover { background: rgba(255,255,255,0.15); }
      @media (max-width: 600px) {
        .back-label { display: none; } /* just the arrow on phones */
      }

      .bar .menu,
      .bar .roll {
        pointer-events: auto;
        color: #fff;
        background: none;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
        padding: 7px 12px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .bar .roll {
        font-size: 0.9rem;
        font-weight: 600;
        background: rgba(255,255,255,0.1);
      }
      .bar .menu:hover,
      .bar .roll:hover { background: rgba(255,255,255,0.2); }

      #looks-panel {
        position: fixed;
        top: 58px;
        right: 18px;
        z-index: 20;
        transition: opacity 0.4s ease;
        width: 230px;
        padding: 14px 14px 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 16px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #looks-panel .panel-title {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        opacity: 0.7;
      }
      #looks-panel .panel-title.how {
        margin: 14px 0 0;
        padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.18);
      }
      #looks-panel .desc {
        margin: 8px 0 0;
        font-size: 0.8rem;
        line-height: 1.5;
        opacity: 0.7;
      }
      #looks-panel input[type="range"] {
        width: 100%;
        margin: 12px 0 2px;
        accent-color: #fff;
        cursor: pointer;
      }
      #looks-panel .theme-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 10px;
        margin-top: 6px;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        text-align: left;
        color: #fff;
        background: rgba(255,255,255,0.06);
        border: 1px solid transparent;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      #looks-panel .theme-btn:first-of-type { margin-top: 0; }
      #looks-panel .theme-btn:hover { background: rgba(255,255,255,0.14); }
      #looks-panel .theme-btn.active { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.12); }
      #looks-panel .dots { display: flex; gap: 4px; flex-shrink: 0; }
      #looks-panel .dots span {
        width: 16px; height: 16px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.25);
      }
      body.idle #looks-panel { opacity: 0; pointer-events: none; }

      .foot {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        background: linear-gradient(0deg, rgba(0,0,0,0.45), rgba(0,0,0,0));
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      .foot .total { font-size: 0.9rem; font-weight: 600; opacity: 0.85; }
      body.idle .foot { opacity: 0; }

      #labels { position: fixed; inset: 0; z-index: 5; pointer-events: none; transition: opacity 0.4s ease; }
      .die-label {
        position: absolute;
        transform: translate(-50%, 0);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        color: rgba(255,255,255,0.7);
        white-space: nowrap;
      }
      .die-label span { font-weight: 700; color: rgba(255,255,255,0.95); }
      body.idle #labels { opacity: 0.35; }
    </style>
  </head>
  <body>
    <header class="bar">
      <a class="back" href="../../">← <span class="back-label">Gallery</span></a>
      <h1>ch4td1c3</h1>
      <button class="roll" id="roll-all" type="button">Roll all</button>
      <button class="menu" id="menu-btn" type="button" aria-label="Menu" aria-haspopup="true">☰</button>
    </header>

    <div id="looks-panel" hidden>
      <p class="panel-title">Die looks</p>
      <button class="theme-btn" data-theme="0" type="button">
        <span class="dots"><span style="background:#a5ba9d"></span><span style="background:#de8c9b"></span></span>Matcha Hearts
      </button>
      <button class="theme-btn" data-theme="1" type="button">
        <span class="dots"><span style="background:#377a6f"></span><span style="background:#eec84a"></span></span>Seaglass Gold
      </button>
      <button class="theme-btn" data-theme="2" type="button">
        <span class="dots"><span style="background:#252230"></span><span style="background:#d1cdda"></span></span>Licorice Silver
      </button>
      <button class="theme-btn" data-theme="3" type="button">
        <span class="dots"><span style="background:#e79fb6"></span><span style="background:#fff3f6"></span></span>Bubblegum
      </button>
      <p class="panel-title how">Volume</p>
      <input type="range" id="volume" min="0" max="100" step="1" value="80" aria-label="Volume" />
      <p class="panel-title how">How to roll</p>
      <p class="desc">Tap a die to roll just that one. Roll all tumbles the whole set; the spacebar works too.</p>
    </div>

    <div id="labels"></div>

    <footer class="foot">
      <span id="total" class="total"></span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

    <script src="../shared/autohide.js"></script>

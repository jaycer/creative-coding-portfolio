<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Browse Egyptian hieroglyphs one at a time — favorite the ones you like. By Jayce Renner." />
    <title>Hieroglyph Viewer ~ Jayce Renner</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jayce Renner — Creative Coding" />
    <meta property="og:title" content="Hieroglyph Viewer" />
    <meta property="og:description" content="Browse Egyptian hieroglyphs one at a time — favorite the ones you like." />
    <meta property="og:url" content="https://jaycer.github.io/creative-coding-portfolio/apps/hieroglyph-viewer/" />
    <meta property="og:image" content="https://jaycer.github.io/creative-coding-portfolio/og/hieroglyph-viewer.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hieroglyph Viewer" />
    <meta name="twitter:description" content="Browse Egyptian hieroglyphs one at a time — favorite the ones you like." />
    <meta name="twitter:image" content="https://jaycer.github.io/creative-coding-portfolio/og/hieroglyph-viewer.jpg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./main.css" />
    <style>
      body { min-height: 100vh; }
      /* Fixed height + centering: the glyph is vertically centered with headroom,
         so tall signs aren't clipped at the top, and the stage never changes size
         as you flip — keeping everything below it perfectly still. */
      /* Fixed-height, centered stage: tall glyphs get headroom (no top cutoff) and
         the layout below never shifts. Glyphs are stacked in a single grid cell so
         a new one can crossfade in over the old. No overflow clip — tall signs like
         S14B must be able to extend past the stage and still show in full. */
      .glyph-stage {
        display: grid;
        place-items: center;
        height: clamp(10rem, 34vw, 19rem);
        font-size: clamp(7rem, 27vw, 15rem);
        line-height: 1;
        user-select: none;
      }
      .glyph-stage .glyph {
        grid-area: 1 / 1;              /* every glyph occupies the same cell → they stack */
        opacity: 0;
        transition: opacity 0.16s ease;
        will-change: opacity;          /* keep the crossfade on the GPU, not a re-raster */
      }
      .glyph-stage .glyph.shown { opacity: 1; }
      /* Reserve two lines for the name and clamp longer ones, so the counter and
         buttons don't jump when a short name follows a long one. */
      #nameheading {
        margin-top: 1.25rem;
        min-height: 3.5rem;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
      }
      #likeddisplay { font-size: 1.8rem; word-break: break-word; min-height: 2.4rem; }
      .info-table th { white-space: nowrap; width: 1%; opacity: 0.7; font-weight: 600; }
      .nav-btn { min-width: 4.5rem; }

      /* Tap/click flash on the nav buttons: a brief sage ripple + press-bounce,
         so interactions read clearly on a screen recording. */
      @keyframes navflash {
        0%   { box-shadow: 0 0 0 0 rgba(125, 148, 104, 0.5); transform: scale(0.96); }
        50%  { transform: scale(1); }
        100% { box-shadow: 0 0 0 14px rgba(125, 148, 104, 0); transform: scale(1); }
      }
      .nav-btn.flash { animation: navflash 0.4s ease-out; }

      /* Keyboard shortcuts: a centered two-column grid of key → action pairs. */
      .key-help__grid {
        display: inline-grid;
        grid-template-columns: repeat(2, auto);
        gap: 0.5rem 1.5rem;
        justify-content: center;
        text-align: left;
      }
      .key-help__grid span { display: inline-flex; align-items: center; gap: 0.35rem; white-space: nowrap; }

      @media (prefers-reduced-motion: reduce) {
        .glyph-stage .glyph { transition: none; }
        .nav-btn.flash { animation: none; }
      }
    </style>
  </head>
  <body class="bg-dark text-light">
    <!-- Top bar -->
    <nav class="navbar navbar-expand bg-dark-gray border-bottom border-secondary px-3 py-2">
      <a class="btn btn-outline-light btn-sm rounded-pill" href="../../">← Gallery</a>
      <span class="navbar-brand mx-3 mb-0 h1 fs-6 text-light">Hieroglyph Viewer</span>
      <div class="ms-auto d-flex gap-2">
        <button class="btn btn-outline-info btn-sm" type="button"
                data-bs-toggle="modal" data-bs-target="#infoModal" title="Glyph details" aria-label="Glyph details">
          <i class="bi bi-info-circle"></i> <span class="d-none d-sm-inline">Info</span>
        </button>
        <button class="btn btn-outline-light btn-sm" type="button"
                onclick="return hvModule.copyLink()" title="Copy link to this glyph" aria-label="Copy link to this glyph">
          <i class="bi bi-link-45deg"></i> <span class="d-none d-sm-inline">Share</span>
        </button>
      </div>
    </nav>

    <main class="container text-center py-5">
      <!-- The glyph -->
      <div class="glyph-stage my-4" id="glyphstage"></div>

      <h2 id="nameheading" class="h4 fw-light mb-2 text-light-gray">&nbsp;</h2>
      <p id="indexdisplay" class="text-muted small mb-5">— / —</p>

      <!-- Controls -->
      <div class="d-inline-flex gap-3 mb-5" role="group" aria-label="glyph navigation">
        <button class="btn btn-outline-light nav-btn" type="button" onclick="return hvModule.decrement()" title="Previous (←)">
          <i class="bi bi-arrow-left"></i> Prev
        </button>
        <button class="btn btn-primary nav-btn" type="button" onclick="return hvModule.like()" title="Favorite (↑)">
          <i class="bi bi-heart-fill"></i> Like
        </button>
        <button class="btn btn-outline-light nav-btn" type="button" onclick="return hvModule.increment()" title="Next (→ / Enter)">
          Next <i class="bi bi-arrow-right"></i>
        </button>
      </div>

      <!-- Page-level details -->
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <table class="table table-sm table-dark text-start info-table mb-0">
            <tbody>
              <tr><th>Gardiner</th><td id="pgardinercode">—</td></tr>
              <tr><th>Phonetic</th><td id="pphonetic">—</td></tr>
              <tr><th>Transliteration</th><td id="ptransliteration">—</td></tr>
              <tr><th>Notes</th><td id="pnotes">—</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Favorites -->
      <div class="mt-5">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
          <span class="text-uppercase small text-muted">Favorites</span>
          <button class="btn btn-outline-secondary btn-sm" type="button" onclick="return hvModule.copyLikes()" title="Copy favorites (↓)">
            <i class="bi bi-clipboard"></i> Copy
          </button>
        </div>
        <div id="likeddisplay"></div>
      </div>

      <div class="mt-5">
        <div class="text-uppercase small text-muted mb-2" style="letter-spacing: 0.1em">Keyboard shortcuts</div>
        <div class="key-help__grid text-muted small">
          <span><kbd>←</kbd> Previous</span>
          <span><kbd>→</kbd> <kbd>Enter</kbd> Next</span>
          <span><kbd>↑</kbd> Like</span>
          <span><kbd>↓</kbd> Copy favorites</span>
        </div>
      </div>
    </main>

    <!-- Info modal -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-gray text-light">
          <div class="modal-header border-secondary">
            <h5 class="modal-title">
              <span id="smodaltitleglyph" style="font-size:2rem">𓀀</span>
              <span id="mpdescription" class="ms-2 fs-6 text-light-gray"></span>
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <table class="table table-sm table-dark info-table mb-0">
              <tbody>
                <tr><th>Gardiner</th><td id="mpgardinercode">—</td></tr>
                <tr><th>Phonetic</th><td id="mpphonetic">—</td></tr>
                <tr><th>Transliteration</th><td id="mptransliteration">—</td></tr>
                <tr><th>Notes</th><td id="mpnotes">—</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Toasts -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div class="toastcopyurl toast align-items-center text-bg-info border-0" role="status" aria-live="polite" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body">Link copied to clipboard.</div>
        </div>
      </div>
      <div class="toastcopyglyphs toast align-items-center text-bg-primary border-0" role="status" aria-live="polite" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body">Favorites copied to clipboard.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./hieroglyph-viewer.js"></script>
  </body>
</html>

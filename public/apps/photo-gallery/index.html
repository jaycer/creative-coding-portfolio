<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jayce Renner Photography</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="description" content="Professional photography including real estate interiors and exteriors, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jayce Renner — Creative Coding" />
    <meta property="og:title" content="Jayce Renner Photography" />
    <meta property="og:description" content="Professional photography including real estate interiors and exteriors, and more." />
    <meta property="og:url" content="https://jaycer.github.io/creative-coding-portfolio/apps/photo-gallery/" />
    <meta property="og:image" content="https://jaycer.github.io/creative-coding-portfolio/og/photo-gallery.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jayce Renner Photography" />
    <meta name="twitter:description" content="Professional photography including real estate interiors and exteriors, and more." />
    <meta name="twitter:image" content="https://jaycer.github.io/creative-coding-portfolio/og/photo-gallery.jpg" />
    <style>
      /* Light gray gallery. The room is neutral and quiet so the photographs
         carry all the color — every surface here is a gray with a trace of
         warmth, and nothing competes with the images. */
      :root {
        --bg:        #e9e9e7;   /* light gray — the wall */
        --bg-2:      #f2f2f0;   /* card / raised surface */
        --line:      #d3d3d0;   /* hairlines */
        --ink:       #26262a;   /* primary text */
        --ink-dim:   #5d5d63;   /* secondary */
        --ink-faint: #8b8b91;   /* labels, counts */
        --shadow:    0 1px 2px rgba(0,0,0,.07), 0 6px 18px rgba(0,0,0,.08);
        --shadow-lift: 0 2px 4px rgba(0,0,0,.09), 0 14px 34px rgba(0,0,0,.14);
        --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }
      /* --- top bar ------------------------------------------------------- */
      .bar {
        display: flex; align-items: baseline; justify-content: flex-end;
        padding: 14px 28px;
        border-bottom: 1px solid var(--line);
      }
      .back {
        color: var(--ink-dim);
        text-decoration: underline; text-decoration-color: var(--ink-faint);
        text-underline-offset: 3px;
        font-size: 14px; letter-spacing: .01em;
        white-space: nowrap;
      }
      .back:hover { color: var(--ink); text-decoration-color: var(--ink); }

      /* --- header -------------------------------------------------------- */
      header { padding: 26px 28px 8px; max-width: 1240px; margin: 0 auto; }
      h1 {
        margin: 0;
        font-size: clamp(24px, 3.4vw, 34px);
        font-weight: 600; letter-spacing: -.018em; line-height: 1.1;
      }
      .lede {
        /* No max-width: the blurb flows the full container width under the title. */
        margin: 12px 0 0;
        font-size: 16px; line-height: 1.55; color: var(--ink-dim);
      }
      .lede a { color: var(--ink); text-decoration-color: var(--ink-faint); text-underline-offset: 3px; }

      /* --- groups + grid -------------------------------------------------- */
      main { max-width: 1240px; margin: 0 auto; padding: 0 28px 96px; }
      section { margin-top: 56px; }
      .group-head {
        display: flex; align-items: baseline; gap: 12px;
        padding-bottom: 12px; margin-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }
      h2 {
        margin: 0; font-size: 15px; font-weight: 600;
        letter-spacing: .08em; text-transform: uppercase;
      }
      .group-note { font-size: 13px; color: var(--ink-faint); }
      .count { margin-left: auto; font-size: 13px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
        gap: 16px;
      }
      .tile {
        display: block; padding: 0; border: 0; border-radius: 3px;
        background: var(--bg-2);
        overflow: hidden; cursor: pointer;
        box-shadow: var(--shadow);
        transition: transform .18s ease, box-shadow .18s ease;
      }
      .tile img {
        display: block; width: 100%; aspect-ratio: 3 / 2;
        object-fit: cover;
        /* Fade each thumb in once decoded — 65 images popping in at different
           times reads as jitter otherwise. */
        opacity: 0; transition: opacity .4s ease;
      }
      .tile img.ready { opacity: 1; }
      .tile:hover, .tile:focus-visible {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lift);
        outline: none;
      }
      .tile:focus-visible { box-shadow: var(--shadow-lift), 0 0 0 2px var(--ink); }

      /* --- modal ---------------------------------------------------------- */
      .modal {
        position: fixed; inset: 0; z-index: 20;
        display: none;
        background: rgba(232,232,230,.97);
        -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      }
      /* minmax(0, 1fr), not 1fr: a bare 1fr track is minmax(auto, 1fr), whose
         auto floor lets the stage grow to the image's intrinsic height, so a
         tall/landscape photo overflows and covers the caption. The 0 floor lets
         the stage shrink and forces object-fit to scale the image down, keeping
         the caption footer on screen at any window height. */
      .modal.open { display: grid; grid-template-rows: minmax(0, 1fr) auto; }
      .stage {
        position: relative;
        /* flex, not grid place-items: a flex item's max-height: 100% resolves
           against the flex container's height, so the photo actually scales
           down to leave the caption room. The grid version let it overflow. */
        display: flex; align-items: center; justify-content: center;
        min-height: 0; padding: 24px 88px 8px;
      }
      .stage img {
        max-width: 100%; max-height: 100%;
        object-fit: contain;
        border-radius: 2px;
        box-shadow: var(--shadow-lift);
        opacity: 0; transition: opacity .22s ease;
      }
      .stage img.ready { opacity: 1; }

      /* Only appears if the full-size photo isn't already cached — see the
         delay in gallery.js, which keeps it from flashing on instant loads. */
      .spinner {
        position: absolute; top: 50%; left: 50%;
        width: 30px; height: 30px; margin: -15px 0 0 -15px;
        border: 2px solid var(--line);
        border-top-color: var(--ink-dim);
        border-radius: 50%;
        opacity: 0; pointer-events: none;
        transition: opacity .2s ease;
        animation: spin .7s linear infinite;
      }
      .spinner.on { opacity: 1; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation-duration: 2.4s; }
      }

      .cap {
        padding: 14px 88px 26px; text-align: center;
      }
      .cap-title { font-size: 15px; font-weight: 600; }
      .cap-note { margin-top: 3px; font-size: 13px; color: var(--ink-faint); }
      .cap-index { margin-top: 8px; font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }

      .nav, .close {
        position: absolute; z-index: 1;
        display: grid; place-items: center;
        width: 46px; height: 46px;
        border: 1px solid var(--line); border-radius: 50%;
        background: var(--bg-2); color: var(--ink);
        cursor: pointer; box-shadow: var(--shadow);
        transition: transform .15s ease, box-shadow .15s ease;
      }
      .nav:hover, .close:hover { transform: scale(1.06); box-shadow: var(--shadow-lift); }
      .nav:disabled { opacity: .32; cursor: default; transform: none; box-shadow: var(--shadow); }
      .prev { left: 22px; top: 50%; margin-top: -23px; }
      .next { right: 22px; top: 50%; margin-top: -23px; }
      .close { top: 18px; right: 22px; position: fixed; }
      .nav svg, .close svg { width: 19px; height: 19px; }

      @media (max-width: 640px) {
        header { padding-top: 36px; }
        main { padding: 0 16px 64px; }
        .bar { padding: 14px 16px; }
        .grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }
        .stage { padding: 60px 12px 8px; }
        .cap { padding: 12px 16px 20px; }
        /* Thumb-reachable arrows on phones, rather than pinned to the edges. */
        .prev { left: 16px; top: auto; bottom: -46px; margin-top: 0; }
        .next { right: 16px; top: auto; bottom: -46px; margin-top: 0; }
      }
    </style>
  </head>
  <body>
    <div class="bar"><a class="back" href="../../">See my creative coding portfolio →</a></div>

    <header>
      <h1>Jayce Renner Photography</h1>
      <p class="lede">
        Professional photography including real estate interiors and exteriors, and more.
      </p>
    </header>

    <main id="main"></main>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Photo viewer">
      <div class="stage">
        <button class="nav prev" id="prev" aria-label="Previous photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="spinner" id="spinner" role="status" aria-label="Loading photo"></div>
        <img id="stageImg" alt="" />
        <button class="nav next" id="next" aria-label="Next photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <div class="cap">
        <div class="cap-title" id="capTitle"></div>
        <div class="cap-note" id="capNote"></div>
        <div class="cap-index" id="capIndex"></div>
      </div>
      <button class="close" id="close" aria-label="Close viewer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <script type="module" src="./gallery.js"></script>
  </body>
</html>

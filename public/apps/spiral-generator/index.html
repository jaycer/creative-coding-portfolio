<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spiral Generator — Jayce Renner</title>
    <meta name="description" content="Paisley spirals accumulate from a rotating ring of squares — mouse sets scale and count." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jayce Renner — Creative Coding" />
    <meta property="og:title" content="Spiral Generator" />
    <meta property="og:description" content="Paisley spirals accumulate from a rotating ring of squares — mouse sets scale and count." />
    <meta property="og:url" content="https://jaycer.github.io/creative-coding-portfolio/apps/spiral-generator/" />
    <meta property="og:image" content="https://jaycer.github.io/creative-coding-portfolio/og/spiral-generator.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spiral Generator" />
    <meta name="twitter:description" content="Paisley spirals accumulate from a rotating ring of squares — mouse sets scale and count." />
    <meta name="twitter:image" content="https://jaycer.github.io/creative-coding-portfolio/og/spiral-generator.jpg" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      canvas { position: fixed; inset: 0; display: block; }

      .bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 18px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
        pointer-events: none;
      }
      .bar h1 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
      .bar .back {
        pointer-events: auto;
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 12px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 999px;
        white-space: nowrap;
        transition: background 0.15s ease;
      }
      .bar .back:hover { background: rgba(255,255,255,0.15); }
      .bar .hint { margin-left: auto; font-size: 0.8rem; opacity: 0.7; }

      #intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        opacity: 1;
        transition: opacity 0.8s ease;
      }
      #intro-overlay.gone { opacity: 0; }
      #intro-overlay span {
        padding: 14px 24px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 16px;
        background: rgba(0,0,0,0.35);
        font-size: 0.95rem;
        letter-spacing: 0.01em;
        line-height: 1.7;
        white-space: pre-line;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <a class="back" href="../../">← Gallery</a>
      <h1>Spiral Generator</h1>
      <span class="hint">mouse sets scale &amp; count · click to clear</span>
    </header>

    <div id="intro-overlay"><span id="intro-text"></span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="./spiral-generator.js"></script>
    <script src="../shared/autohide.js"></script>
  </body>
</html>

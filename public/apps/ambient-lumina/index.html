<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambient Lumina — Jayce Renner</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #14151a; }
      canvas { position: fixed; inset: 0; display: block; }

      .bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 18px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        background: linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0));
        pointer-events: none;
      }
      .bar h1 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: -0.01em; }
      .bar .back {
        pointer-events: auto;
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 12px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 999px;
        white-space: nowrap;
        transition: background 0.15s ease;
      }
      .bar .back:hover { background: rgba(255,255,255,0.15); }
      .bar .hint { margin-left: auto; font-size: 0.8rem; opacity: 0.7; }

      #sound-overlay {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #fff;
        opacity: 1;
        transition: opacity 0.8s ease;
      }
      #sound-overlay.gone { opacity: 0; }
      #sound-overlay span {
        padding: 12px 22px;
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: 999px;
        background: rgba(0,0,0,0.35);
        font-size: 0.95rem;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <a class="back" href="../../">← Gallery</a>
      <h1>Ambient Lumina</h1>
      <span class="hint" id="sound-hint">pitch from color · pan from motion</span>
    </header>

    <div id="sound-overlay"><span>🔊 click anywhere to begin the sound</span></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="./config.js"></script>
    <script src="./ambient-lumina.js"></script>
    <script src="../shared/autohide.js"></script>
  </body>
</html>

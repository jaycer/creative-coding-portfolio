<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jayce Renner — Creative Coding portfolio. Generative art, simulations, and interactive sketches." />
    <title>Jayce Renner — Creative Coding</title>
    <link rel="icon" type="image/svg+xml" href="/creative-coding-portfolio/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jayce Renner — Creative Coding" />
    <meta property="og:title" content="Jayce Renner — Creative Coding" />
    <meta property="og:description" content="Generative art, simulations &amp; interactive sketches." />
    <meta property="og:url" content="https://jaycer.github.io/creative-coding-portfolio/" />
    <meta property="og:image" content="https://jaycer.github.io/creative-coding-portfolio/og/_gallery.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jayce Renner — Creative Coding" />
    <meta name="twitter:description" content="Generative art, simulations &amp; interactive sketches." />
    <meta name="twitter:image" content="https://jaycer.github.io/creative-coding-portfolio/og/_gallery.jpg" />
    <!-- Critical base styles so the page paints its real background on the first
         frame. The full stylesheet is imported by /src/main.js, which Vite
         injects via JS in dev — without this the page flashes unstyled (white)
         before that runs. Values mirror --bg / --ink in src/style.css. -->
    <style>
      html, body { margin: 0; padding: 0; background: #535357; color: #1d1f24; }
      /* Keep content hidden until main.js has applied the stylesheet and built
         the grid, then it reveals all at once — no flash of the unstyled title.
         The gray background still shows via <html> above. */
      body.preload { visibility: hidden; }
    </style>
  </head>
  <body class="preload">
    <header class="site-header">
      <div class="site-header__inner">
        <div class="site-header__titles">
          <h1>Jayce Renner <span class="dash">—</span> Creative Coding</h1>
          <p class="tagline">Generative art, simulations &amp; interactive sketches.</p>
        </div>
        <div class="site-header__tools">
          <span id="version" class="version" title="Version">v0.0.0</span>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="grid" class="grid" aria-label="Portfolio entries"></section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>© <span id="year"></span> Jayce Renner</span>
        <div class="site-footer__tools">
          <button id="hard-refresh" class="btn-refresh" type="button" title="Hard refresh (clears service workers &amp; caches)">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" focusable="false">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M20 11a8 8 0 1 0-1.6 5.2M20 5v6h-6" />
            </svg>
            <span>Refresh</span>
          </button>
          <a href="https://github.com/jaycer/creative-coding-portfolio" target="_blank" rel="noopener">Source on GitHub</a>
        </div>
      </div>
    </footer>

    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
